name: Deploy to Azure App Service

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-azure-app-service.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: app-purelybi-backend-dev-ci
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup UV
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Generate requirements.txt
        run: uv pip compile pyproject.toml -o requirements.txt

      - name: Install dependencies for Azure (site-packages)
        run: uv pip install -r requirements.txt --target .python_packages/lib/site-packages

      # Single folder for upload so the deploy job always gets a predictable path (avoids ./backend missing after artifact extract).
      - name: Stage deployment package
        working-directory: ${{ github.workspace }}
        run: |
          rm -rf stage-app
          cp -a backend stage-app
          rm -rf stage-app/.venv stage-app/venv 2>/dev/null || true
          rm -f stage-app/.env 2>/dev/null || true

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: stage-app
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/stage-app
